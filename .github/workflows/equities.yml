name: Crypto 4hr
on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'  # 9:30-4pm ET, weekdays
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - - run: pip install alpaca-py pandas numpy requests matplotlib
      - run: python main.py
        env:
          RUN_MODE: crypto
          ALPACA_PAPER: "true"
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
- name: Save research
  run: |
    git config user.name "bot"
    git config user.email "bot@users.noreply.github.com"
    git add research.db || true
    git commit -m "research update" || true
    git push || true