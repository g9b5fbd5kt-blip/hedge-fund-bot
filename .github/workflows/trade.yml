name: Hedge Fund Bot

on:
  schedule:
    # Every 15 min, 9:30 AM - 4 PM ET (13:30-20:00 UTC), Mon-Fri
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:  # allows manual run

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install deps
        run: |
          pip install alpaca-trade-api requests matplotlib pandas pytz
          
      - name: Run bot
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: python main.py
        
      - name: Save trade log
        uses: actions/upload-artifact@v4
        with:
          name: trades-${{ github.run_number }}
          path: |
            trades.csv
            brain.json
          retention-days: 30