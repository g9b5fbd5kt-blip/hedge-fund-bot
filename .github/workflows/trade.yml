on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes, 24/7
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bot
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python main.py