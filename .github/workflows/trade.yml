name: Trade Bot v9.2 - Free Tier
on:
  schedule:
    # MARKET HOURS: Every 15 min, Mon-Fri 9:30am-4pm ET
    - cron: '30,45 13 * * 1-5'
    - cron: '0,15,30,45 14-19 * * 1-5'
    - cron: '0 20 * * 1-5'
    # CRYPTO OVERNIGHT: Every 30 min, weekdays overnight
    - cron: '0,30 0-12 * * 1-5'
    - cron: '0,30 21-23 * * 1-5'
    # WEEKENDS: Every 30 min, Sat & Sun
    - cron: '0,30 * * * 0,6'
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install aiohttp async-lru
      - run: python bot.py
        env:
          APCA_API_KEY_ID: ${{ secrets.ALPACA_KEY }}
          APCA_API_SECRET_KEY: ${{ secrets.ALPACA_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT }}