name: Hedge Fund Bot 24/7

on:
  schedule:
    # Market hours: every 5 min (high volatility)
    - cron: '*/5 13-20 * * 1-5' # 9:30am-4pm ET = 13:30-20:00 UTC
    # Extended hours: every 15 min
    - cron: '*/15 8-13,20-0 * * 1-5' # 4am-9:30am, 4pm-8pm ET
    # Overnight crypto: every 30 min
    - cron: '*/30 0-8 * * *' # 8pm-4am ET
    # Weekends crypto: hourly
    - cron: '0 * * * 0,6'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install alpaca-trade-api pytz requests
      - name: Run bot
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py