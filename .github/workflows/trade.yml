name: Hedge Fund Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 13-20 * * 1-5'

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests matplotlib yfinance pandas numpy
      - name: Run bot
        run: python bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      - name: Commit memory
        run: |
          git config user.name "hedge-bot"
          git config user.email "bot@users.noreply.github.com"
          git add memory.json
          git diff --staged --quiet || git commit -m "update memory [skip ci]"
          git push